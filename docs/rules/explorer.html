<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rule Enrichment Explorer</title>
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --primary: #2563eb;
    --primary-text: #ffffff;
    --chip-bg: #eef2ff;
    --chip-text: #3730a3;
    --code-bg: #0f172a;
    --code-text: #e2e8f0;
    --shadow: 0 1px 2px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.06);
    --radius: 12px;
    --radius-sm: 8px;
  }
  [data-theme="dark"] {
    --bg: #0b0f19;
    --surface: #111827;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --border: #1f2937;
    --primary: #3b82f6;
    --primary-text: #ffffff;
    --chip-bg: #1e293b;
    --chip-text: #93c5fd;
    --code-bg: #0b0f19;
    --code-text: #e2e8f0;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    background: var(--bg);
    color: var(--text);
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: space-between; margin-bottom: 16px; }
  h1 { font-size: 22px; margin: 0; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1 1 260px; min-width: 220px; }
  .search-wrap input {
    width: 100%; padding: 10px 12px 10px 36px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-size: 14px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer;
  }
  .btn[aria-pressed="true"] { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
  .btn:hover { filter: brightness(0.98); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .results { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; outline: none; transition: transform .06s ease, box-shadow .2s ease;
  }
  .card:focus-visible { box-shadow: 0 0 0 3px rgba(37,99,235,0.25); }
  .card-header {
    display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; cursor: pointer; user-select: none;
  }
  .card-header .meta { flex: 1; }
  .rule-id { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; color: var(--muted); }
  .rule-title { font-weight: 600; font-size: 15px; margin-top: 2px; }
  .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .pill {
    font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--chip-bg); color: var(--chip-text); font-weight: 600;
  }
  .pill.difficulty-easy { background: #dcfce7; color: #166534; }
  .pill.difficulty-medium { background: #fef9c3; color: #854d0e; }
  .pill.difficulty-hard { background: #fee2e2; color: #991b1b; }
  [data-theme="dark"] .pill.difficulty-easy { background: #14532d; color: #bbf7d0; }
  [data-theme="dark"] .pill.difficulty-medium { background: #713f12; color: #fde047; }
  [data-theme="dark"] .pill.difficulty-hard { background: #7f1d1d; color: #fecaca; }
  .chevron { margin-left: auto; color: var(--muted); transition: transform .2s ease; flex-shrink: 0; }
  .card[aria-expanded="true"] .chevron { transform: rotate(180deg); }
  .card-body { display: none; padding: 0 16px 16px; }
  .card[aria-expanded="true"] .card-body { display: block; }
  .section { margin-top: 12px; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .section p { margin: 0; font-size: 14px; line-height: 1.55; }
  .code-block { position: relative; margin-top: 8px; }
  .code-block pre {
    margin: 0; padding: 12px; border-radius: var(--radius-sm); background: var(--code-bg); color: var(--code-text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px;
    line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-word;
  }
  .code-block .copy {
    position: absolute; top: 8px; right: 8px; padding: 4px 8px; font-size: 11px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #e2e8f0; cursor: pointer;
  }
  .code-block .copy:hover { background: rgba(255,255,255,0.15); }
  .links { display: flex; flex-direction: column; gap: 6px; }
  .links a { color: var(--primary); text-decoration: none; font-size: 13px; }
  .links a:hover { text-decoration: underline; }
  .tag-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 12px; padding: 4px 8px; border-radius: 6px; background: var(--chip-bg); color: var(--chip-text); }
  .empty { text-align: center; color: var(--muted); padding: 40px 16px; }
  .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--muted); }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  .theme-btn { position: fixed; top: 16px; right: 16px; z-index: 1000; }
  .highlight { background: rgba(253,224,71,0.35); padding: 1px 2px; border-radius: 3px; }
  [data-theme="dark"] .highlight { background: rgba(253,224,71,0.2); }
</style>
</head>
<body>
  <button class="btn theme-btn" id="themeBtn" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
  <div class="container">
    <header>
      <h1>🔍 Rule Enrichment Explorer</h1>
      <div class="controls">
        <span class="kbd">/</span> <span style="font-size:12px;color:var(--muted)">Search</span>
        <span class="kbd">↑↓</span> <span style="font-size:12px;color:var(--muted)">Navigate</span>
        <span class="kbd">Enter</span> <span style="font-size:12px;color:var(--muted)">Expand</span>
        <span class="kbd">Esc</span> <span style="font-size:12px;color:var(--muted)">Close</span>
      </div>
    </header>
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input id="search" type="text" placeholder="Search by rule ID, title, or notes…" autocomplete="off" />
    </div>
    <div class="filters" id="filters">
      <div class="filter-group">
        <span class="filter-label">Type</span>
        <button class="btn filter" data-filter="ruleType" data-value="wcag" aria-pressed="false">WCAG</button>
        <button class="btn filter" data-filter="ruleType" data-value="best-practice" aria-pressed="false">Best Practice</button>
        <button class="btn filter" data-filter="ruleType" data-value="experimental" aria-pressed="false">Experimental</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">Difficulty</span>
        <button class="btn filter" data-filter="fixDifficulty" data-value="Easy" aria-pressed="false">Easy</button>
        <button class="btn filter" data-filter="fixDifficulty" data-value="Medium" aria-pressed="false">Medium</button>
        <button class="btn filter" data-filter="fixDifficulty" data-value="Hard" aria-pressed="false">Hard</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">Issue</span>
        <button class="btn filter" data-filter="issueType" data-value="failure" aria-pressed="false">Failure</button>
        <button class="btn filter" data-filter="issueType" data-value="needs review" aria-pressed="false">Needs Review</button>
        <button class="btn filter" data-filter="issueType" data-value="failure, needs review" aria-pressed="false">Both</button>
      </div>
    </div>
    <div class="results" id="results">Loading…</div>
    <div class="grid" id="grid" role="list"></div>
  </div>

    "wcagTechniques": null,

    "badExample": "<!-- Fixed header covers focused elements -->\n<header style='position: fixed; height: 80px'>",

    ],
    "ariaPractices": null,
    "clientFix": "The aria-label or aria-labelledby must include the exact visible text. If button says 'Send', aria-label should start with 'Send'.",
    "badExample": "<button aria-label='submit-form'>Send</button>",
    "goodExample": "<button aria-label='Send message'>Send</button>",
    "codeHighlight": "aria-label",
    "affectedUsers": [

  {
    "id": "custom-image-annotation",
    "auditorTitle": "Image missing alt text",

    "wcagTechniques": [
      {
        "id": "H37",

        "url": "https://www.w3.org/WAI/WCAG22/Techniques/html/H37"

    ],

    ],
    "ariaPractices": null,
    "clientFix": "Add alt text describing the image. Use alt='' for decorative images. Use aria-label for SVGs and background images.",
    "badExample": "<img src='chart.png'>",
    "goodExample": "<img src='chart.png' alt='Sales increased 25% in Q4'>",
    "codeHighlight": "alt",
    "affectedUsers": [

    "fixDifficulty": "Easy"
  }
]
</script>

  <script>
  (function() {
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const results = document.getElementById('results');
    const themeBtn = document.getElementById('themeBtn');
    const filterBtns = document.querySelectorAll('.filter');

    let rules = [];
    let activeFilters = {};
    let focusedIndex = -1;

    function loadData() {
      const el = document.getElementById('rules-data');
      if (!el) return [];
      const text = el.textContent.replace(/<!--\s*RULES_DATA_PLACEHOLDER\s*-->/, '');
      try {
        const parsed = JSON.parse(text);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    rules = loadData();
    if (!rules.length) {
      results.textContent = 'No rules loaded. Run generate-data.js to populate rules.json and inline data into this page.';
      return;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function highlightKeyword(text, keyword) {
      if (!keyword) return escapeHtml(text);
      const re = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return escapeHtml(text).replace(re, '<span class="highlight">$1</span>');
    }

    function renderLinks(arr) {
      if (!arr || !arr.length) return '<span style="color:var(--muted);font-size:13px;">—</span>';
      return arr.map(item => {
        const label = item.id ? (item.id + ': ' + item.title) : (item.pattern || item.title || 'Link');
        return `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`;
      }).join('\n');
    }

    function renderAriaPractices(val) {
      if (!val) return '<span style="color:var(--muted);font-size:13px;">—</span>';
      if (typeof val === 'string') return `<a href="${escapeHtml(val)}" target="_blank" rel="noopener">${escapeHtml(val)}</a>`;
      if (Array.isArray(val)) {
        return val.map(item => `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.pattern || item.title || 'Pattern')}</a>`).join('\n');
      }
      return '';
    }

    function difficultyClass(d) {
      if (d === 'Easy') return 'difficulty-easy';
      if (d === 'Medium') return 'difficulty-medium';
      if (d === 'Hard') return 'difficulty-hard';
      return '';
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1200);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1200);
      });
    }

    function matches(rule, q) {
      if (!q) return true;
      const hay = (rule.id + ' ' + (rule.auditorTitle||'') + ' ' + (rule.auditorNotes||'')).toLowerCase();
      return hay.includes(q.toLowerCase());
    }

    function passesFilters(rule) {
      for (const key in activeFilters) {
        const vals = activeFilters[key];
        if (!vals || !vals.length) continue;
        const ruleVal = rule[key];
        if (!ruleVal) return false;
        if (!vals.includes(ruleVal)) return false;
      }
      return true;
    }

    function render() {
      const q = search.value.trim();
      const filtered = rules.filter(r => matches(r, q) && passesFilters(r));
      results.textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
      grid.innerHTML = '';
      if (!filtered.length) {
        grid.innerHTML = '<div class="empty">No rules match your search.</div>';
        focusedIndex = -1;
        return;
      }
      filtered.forEach((rule, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('role', 'listitem');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-expanded', 'false');
        card.dataset.index = idx;

        const issueType = rule.issueType || '—';
        const ruleTypeLabel = rule.ruleType || '—';
        const diffClass = difficultyClass(rule.fixDifficulty);

        card.innerHTML = `
          <div class="card-header">
            <div class="meta">
              <div class="rule-id">${escapeHtml(rule.id)}</div>
              <div class="rule-title">${highlightKeyword(rule.auditorTitle || 'Untitled', q)}</div>
              <div class="pills">
                <span class="pill">${escapeHtml(ruleTypeLabel)}</span>
                <span class="pill ${diffClass}">${escapeHtml(rule.fixDifficulty || '—')}</span>
                ${rule.issueType ? `<span class="pill">${escapeHtml(rule.issueType)}</span>` : ''}
              </div>
            </div>
            <span class="chevron" aria-hidden="true">▼</span>
          </div>
          <div class="card-body">
            <div class="section">
              <div class="section-title">Auditor Notes</div>
              <p>${highlightKeyword(rule.auditorNotes || '—', q)}</p>
            </div>
            <div class="section">
              <div class="section-title">Client Fix</div>
              <p>${escapeHtml(rule.clientFix || '—')}</p>
            </div>
            <div class="section">
              <div class="section-title">Affected Users</div>
              <div class="tag-list">
                ${(rule.affectedUsers || []).map(u => `<span class="tag">${escapeHtml(u)}</span>`).join('') || '<span style="color:var(--muted);font-size:13px;">—</span>'}
              </div>
            </div>
            <div class="section">
              <div class="section-title">WCAG Techniques</div>
              <div class="links">${renderLinks(rule.wcagTechniques)}</div>
            </div>
            <div class="section">
              <div class="section-title">WCAG Failures</div>
              <div class="links">${renderLinks(rule.wcagFailures)}</div>
            </div>
            <div class="section">
              <div class="section-title">ARIA Practices</div>
              <div class="links">${renderAriaPractices(rule.ariaPractices)}</div>
            </div>
            <div class="section">
              <div class="section-title">Bad Example</div>
              <div class="code-block">
                <pre><code>${highlightKeyword(rule.badExample || '—', rule.codeHighlight)}</code></pre>
                <button class="copy" data-code="${escapeHtml(rule.badExample || '')}">Copy</button>
              </div>
            </div>
            <div class="section">
              <div class="section-title">Good Example</div>
              <div class="code-block">
                <pre><code>${highlightKeyword(rule.goodExample || '—', rule.codeHighlight)}</code></pre>
                <button class="copy" data-code="${escapeHtml(rule.goodExample || '')}">Copy</button>
              </div>
            </div>
          </div>
        `;
        card.querySelector('.card-header').addEventListener('click', () => toggleCard(card));
        card.querySelectorAll('.copy').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            copyToClipboard(btn.dataset.code, btn);
          });
        });
        grid.appendChild(card);
      });
      focusedIndex = -1;
    }

    function toggleCard(card) {
      const expanded = card.getAttribute('aria-expanded') === 'true';
      card.setAttribute('aria-expanded', String(!expanded));
    }

    function focusCard(index) {
      const cards = grid.querySelectorAll('.card');
      if (!cards.length) return;
      if (index < 0) index = 0;
      if (index >= cards.length) index = cards.length - 1;
      focusedIndex = index;
      cards[index].focus();
    }

    search.addEventListener('input', () => render());

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.filter;
        const val = btn.dataset.value;
        const pressed = btn.getAttribute('aria-pressed') === 'true';
        btn.setAttribute('aria-pressed', String(!pressed));
        if (!activeFilters[key]) activeFilters[key] = [];
        if (!pressed) {
          activeFilters[key].push(val);
        } else {
          activeFilters[key] = activeFilters[key].filter(v => v !== val);
        }
        render();
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== search) {
        e.preventDefault();
        search.focus();
      }
      if (e.key === 'Escape') {
        if (document.activeElement === search) { search.blur(); return; }
        const cards = grid.querySelectorAll('.card');
        cards.forEach(c => c.setAttribute('aria-expanded', 'false'));
      }
      if (['ArrowDown','ArrowUp','Enter','Home','End'].includes(e.key)) {
        const cards = grid.querySelectorAll('.card');
        if (!cards.length) return;
        if (['ArrowDown','ArrowUp','Home','End'].includes(e.key)) {
          e.preventDefault();
        }
        if (e.key === 'ArrowDown') focusCard(focusedIndex + 1);
        if (e.key === 'ArrowUp') focusCard(focusedIndex - 1);
        if (e.key === 'Home') focusCard(0);
        if (e.key === 'End') focusCard(cards.length - 1);
        if (e.key === 'Enter' && focusedIndex >= 0) {
          e.preventDefault();
          toggleCard(cards[focusedIndex]);
        }
      }
    });

    grid.addEventListener('click', (e) => {
      const card = e.target.closest('.card');
      if (card) {
        const cards = Array.from(grid.querySelectorAll('.card'));
        focusedIndex = cards.indexOf(card);
      }
    });

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('re-theme', theme);
      themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
      themeBtn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    const saved = localStorage.getItem('re-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(saved);
    themeBtn.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(next);
    });

    render();
  })();
  </script>
